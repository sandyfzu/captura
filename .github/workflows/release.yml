name: Release

run-name: Release ${{ github.ref_name }}${{ github.event_name == 'workflow_dispatch' && inputs.publish && ' (publish)' || ' (dry-run)' }}

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm after all build, packaging, and smoke-test gates pass. Must be run from a vX.Y.Z tag.'
        required: true
        type: boolean
        default: false
      npm_tag:
        description: 'npm dist-tag to apply when publishing.'
        required: true
        type: choice
        default: latest
        options:
          - latest
          - next
          - beta
          - alpha
      publish_auth:
        description: 'Authentication for real npm publish. Use trusted-publishing normally; use token-bootstrap only for the first publish of new package names.'
        required: true
        type: choice
        default: trusted-publishing
        options:
          - trusted-publishing
          - token-bootstrap

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24
  RUST_BACKTRACE: 1

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.meta.outputs.version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      publish: ${{ steps.meta.outputs.publish }}
      publish_auth: ${{ steps.meta.outputs.publish_auth }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Resolve and validate release metadata
        id: meta
        shell: bash
        env:
          INPUT_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || false }}
          INPUT_NPM_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.npm_tag || 'latest' }}
          INPUT_PUBLISH_AUTH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_auth || 'trusted-publishing' }}
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          VERSION="$version" node <<'NODE'
          const version = process.env.VERSION
          // SemVer 2.0.0 official regex: https://semver.org/#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string
          const semverPattern = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*))?(?:\+([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?$/
          if (!semverPattern.test(version)) {
            throw new Error(`package.json version is not valid SemVer 2.0.0: ${version}`)
          }
          NODE

          publish="$INPUT_PUBLISH"
          npm_tag="$INPUT_NPM_TAG"
          publish_auth="$INPUT_PUBLISH_AUTH"
          ref_type="${GITHUB_REF_TYPE:-}"
          ref_name="${GITHUB_REF_NAME:-}"

          case "$publish_auth" in
            trusted-publishing|token-bootstrap) ;;
            *)
              echo "Invalid publish_auth value: $publish_auth" >&2
              exit 1
              ;;
          esac

          case "$npm_tag" in
            latest|next|beta|alpha) ;;
            *)
              echo "Invalid npm_tag value: $npm_tag" >&2
              exit 1
              ;;
          esac

          if [[ "$ref_type" == "tag" && "$ref_name" != "v$version" ]]; then
            echo "Release tag $ref_name does not match package.json version v$version" >&2
            exit 1
          fi

          if [[ "$publish" == "true" && "$ref_type" != "tag" ]]; then
            echo "Publishing requires manually dispatching this workflow from the v$version tag." >&2
            exit 1
          fi

          if [[ "$publish" == "true" && "$npm_tag" == "latest" && "$version" == *-* ]]; then
            echo "Pre-release version $version must not be published with the latest dist-tag." >&2
            exit 1
          fi

          if [[ "$publish" != "true" && "$publish_auth" != "trusted-publishing" ]]; then
            echo "publish_auth=token-bootstrap is only valid when publish=true." >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "npm_tag=$npm_tag"
            echo "publish=$publish"
            echo "publish_auth=$publish_auth"
          } >> "$GITHUB_OUTPUT"

  verify:
    name: Verify source gates
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-24.04-verify

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libclang-dev \
            libxcb1-dev libxrandr-dev libdbus-1-dev \
            libpipewire-0.3-dev libwayland-dev libegl-dev libgbm-dev

      - run: npm ci
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked

      - name: Generate NAPI entrypoints for TypeScript
        shell: bash
        run: |
          set -euo pipefail

          npx napi build --platform --release -p captura -o . --target x86_64-unknown-linux-gnu -- --locked
          test -f index.js
          test -f index.d.ts

      - uses: actions/upload-artifact@v7
        with:
          name: napi-root-entrypoints
          path: |
            index.js
            index.d.ts
          if-no-files-found: error
          retention-days: 7

      - run: npm run typecheck
      - run: npm audit --audit-level=moderate
      - uses: EmbarkStudios/cargo-deny-action@v2

  build:
    name: Build ${{ matrix.target }}
    needs: [prepare, verify]
    runs-on: ${{ matrix.host }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            host: macos-15-intel
            timeout: 45
            musl: false
            node_arch: x64
          - target: aarch64-apple-darwin
            host: macos-15
            timeout: 45
            musl: false
            node_arch: arm64
          - target: x86_64-pc-windows-msvc
            host: windows-2025-vs2026
            timeout: 60
            musl: false
            node_arch: x64
          - target: aarch64-pc-windows-msvc
            host: windows-11-arm
            timeout: 60
            musl: false
            node_arch: arm64
          # GNU Linux packages are built on Ubuntu 24.04 because the current
          # pipewire-rs/libspa bindings require PipeWire headers newer than
          # Ubuntu 22.04's package set.
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-24.04
            timeout: 60
            musl: false
            node_arch: x64
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-24.04-arm
            timeout: 60
            musl: false
            node_arch: arm64
          - target: x86_64-unknown-linux-musl
            host: ubuntu-24.04
            timeout: 90
            musl: true
            docker_platform: linux/amd64
            node_arch: x64
          - target: aarch64-unknown-linux-musl
            host: ubuntu-24.04-arm
            timeout: 120
            musl: true
            docker_platform: linux/arm64
            node_arch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.musl }}
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.musl }}
        with:
          key: ${{ matrix.host }}-${{ matrix.target }}-build

      - uses: actions/setup-node@v6
        if: ${{ !matrix.musl }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install npm dependencies
        if: ${{ !matrix.musl }}
        run: npm ci

      - name: Verify native Node.js architecture
        if: ${{ !matrix.musl }}
        env:
          EXPECTED_NODE_ARCH: ${{ matrix.node_arch }}
        run: |
          node -e 'const actual = process.arch; const expected = process.env.EXPECTED_NODE_ARCH; if (actual !== expected) { throw new Error("Expected native Node.js " + expected + ", got " + actual); }'

      - name: Install Linux system dependencies
        if: ${{ !matrix.musl && runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libclang-dev \
            libxcb1-dev libxrandr-dev libdbus-1-dev \
            libpipewire-0.3-dev libwayland-dev libegl-dev libgbm-dev

      - name: Build native addon
        if: ${{ !matrix.musl }}
        run: npx napi build --platform --release -p captura -o . --target ${{ matrix.target }} -- --locked

      - name: Build native addon in Alpine musl
        if: ${{ matrix.musl }}
        shell: bash
        env:
          EXPECTED_NODE_ARCH: ${{ matrix.node_arch }}
          NAPI_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          # shellcheck disable=SC2016
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -e EXPECTED_NODE_ARCH \
            -e NAPI_TARGET \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            node:${{ env.NODE_VERSION }}-alpine sh -ec '
              actual_arch="$(node -p "process.arch")"
              if [ "$actual_arch" != "$EXPECTED_NODE_ARCH" ]; then
                echo "Expected native Node.js $EXPECTED_NODE_ARCH, got $actual_arch" >&2
                exit 1
              fi

              apk add --no-cache \
                curl build-base clang-dev pkgconf \
                libxcb-dev libxrandr-dev dbus-dev \
                pipewire-dev wayland-dev mesa-dev

              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | \
                sh -s -- -y --default-toolchain stable
              . "$HOME/.cargo/env"

              printf "#!/bin/sh\nrustc=\"\$1\"\nshift\nexec \"\$rustc\" -C target-feature=-crt-static \"\$@\"\n" \
                > /usr/local/bin/rustc-crt-dynamic
              chmod +x /usr/local/bin/rustc-crt-dynamic
              export RUSTC_WRAPPER=/usr/local/bin/rustc-crt-dynamic
              export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=gcc
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=gcc

              npm ci
              npx napi build --platform --release -p captura -o . --target "$NAPI_TARGET" -- --locked
            '

          sudo chown -R "$(id -u):$(id -g)" .

      - name: Verify native addon artifact
        shell: bash
        run: |
          set -euo pipefail

          native_files="$(find . -maxdepth 1 -type f -name '*.node' -print | sort)"
          native_count="$(printf '%s\n' "$native_files" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [[ "$native_count" != "1" ]]; then
            echo "Expected exactly one native .node artifact for ${{ matrix.target }}, found $native_count." >&2
            printf '%s\n' "$native_files" >&2
            exit 1
          fi

          printf 'Built native addon for %s:\n%s\n' '${{ matrix.target }}' "$native_files"

      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: '*.node'
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  package:
    name: Generate and verify npm packages
    needs: [prepare, verify, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      version: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          path: artifacts

      - uses: actions/download-artifact@v8
        with:
          name: napi-root-entrypoints
          path: .

      - name: Verify generated root entrypoints
        shell: bash
        run: |
          set -euo pipefail

          for file in index.js index.d.ts; do
            if [[ ! -s "$file" ]]; then
              echo "Missing generated NAPI root entrypoint: $file" >&2
              exit 1
            fi
          done

      - name: Generate NAPI platform package directories
        run: npm run create:npm-dirs

      - name: Copy native artifacts into platform packages
        run: npm run artifacts

      - name: Finalize NAPI package metadata
        run: npm run prepublish:napi

      - name: Validate generated package metadata
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const { existsSync, readdirSync, readFileSync } = require('node:fs')
          const { join } = require('node:path')

          const expected = [
            { directory: 'darwin-x64', packageName: 'captura-darwin-x64', os: ['darwin'], cpu: ['x64'] },
            { directory: 'darwin-arm64', packageName: 'captura-darwin-arm64', os: ['darwin'], cpu: ['arm64'] },
            { directory: 'win32-x64-msvc', packageName: 'captura-win32-x64-msvc', os: ['win32'], cpu: ['x64'] },
            { directory: 'win32-arm64-msvc', packageName: 'captura-win32-arm64-msvc', os: ['win32'], cpu: ['arm64'] },
            { directory: 'linux-x64-gnu', packageName: 'captura-linux-x64-gnu', os: ['linux'], cpu: ['x64'], libc: ['glibc'] },
            { directory: 'linux-arm64-gnu', packageName: 'captura-linux-arm64-gnu', os: ['linux'], cpu: ['arm64'], libc: ['glibc'] },
            { directory: 'linux-x64-musl', packageName: 'captura-linux-x64-musl', os: ['linux'], cpu: ['x64'], libc: ['musl'] },
            { directory: 'linux-arm64-musl', packageName: 'captura-linux-arm64-musl', os: ['linux'], cpu: ['arm64'], libc: ['musl'] },
          ]

          const root = JSON.parse(readFileSync('package.json', 'utf8'))
          const optional = root.optionalDependencies || {}
          const expectedPackageNames = new Set(expected.map(({ packageName }) => packageName))
          const optionalNames = Object.keys(optional)
          const missingOptional = [...expectedPackageNames].filter((packageName) => !(packageName in optional))
          const unexpectedOptional = optionalNames.filter((packageName) => !expectedPackageNames.has(packageName))

          if (missingOptional.length > 0) {
            throw new Error(`Root optionalDependencies is missing: ${missingOptional.join(', ')}`)
          }
          if (unexpectedOptional.length > 0) {
            throw new Error(`Root optionalDependencies has unexpected packages: ${unexpectedOptional.join(', ')}`)
          }

          function asList(value) {
            if (value === undefined) return []
            return Array.isArray(value) ? value : [value]
          }

          function assertExactList(packageJsonPath, field, actualValue, expectedValue = []) {
            const actual = asList(actualValue).sort()
            const expected = expectedValue.slice().sort()
            if (actual.length !== expected.length || actual.some((value, index) => value !== expected[index])) {
              throw new Error(`${packageJsonPath} ${field} must be ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`)
            }
          }

          for (const { packageName } of expected) {
            if (optional[packageName] !== root.version) {
              throw new Error(`optionalDependencies.${packageName} must be ${root.version}, got ${optional[packageName]}`)
            }
          }

          for (const { directory, packageName, os, cpu, libc } of expected) {
            const packageDir = join('npm', directory)
            const packageJsonPath = join(packageDir, 'package.json')
            if (!existsSync(packageJsonPath)) {
              throw new Error(`Missing generated package metadata: ${packageJsonPath}`)
            }

            const packageJson = JSON.parse(readFileSync(packageJsonPath, 'utf8'))
            if (packageJson.name !== packageName) {
              throw new Error(`${packageJsonPath} name must be ${packageName}, got ${packageJson.name}`)
            }
            if (packageJson.version !== root.version) {
              throw new Error(`${packageJsonPath} version must be ${root.version}, got ${packageJson.version}`)
            }
            if (packageJson.repository?.url !== root.repository?.url) {
              throw new Error(`${packageJsonPath} repository.url must be ${root.repository?.url}, got ${packageJson.repository?.url ?? '<missing>'}`)
            }
            assertExactList(packageJsonPath, 'os', packageJson.os, os)
            assertExactList(packageJsonPath, 'cpu', packageJson.cpu, cpu)
            assertExactList(packageJsonPath, 'libc', packageJson.libc, libc)

            const nativeFiles = readdirSync(packageDir).filter((file) => file.endsWith('.node'))
            if (nativeFiles.length !== 1) {
              throw new Error(`${packageDir} must contain exactly one native .node file, found ${nativeFiles.length}`)
            }
          }

          console.log(`Validated ${expected.length} generated native packages for captura ${root.version}`)
          NODE

      - name: Verify package dry-runs
        shell: bash
        run: |
          set -euo pipefail

          npm pack --dry-run --json > pack-root.json

          node <<'NODE'
          const { readFileSync } = require('node:fs')
          const report = JSON.parse(readFileSync('pack-root.json', 'utf8'))[0]
          const packed = new Set(report.files.map((file) => file.path))
          for (const required of ['README.md', 'CHANGELOG.md', 'RELEASE.md', 'LICENSE', 'index.js', 'index.d.ts', 'package.json']) {
            if (!packed.has(required)) {
              throw new Error(`Root package dry-run is missing ${required}`)
            }
          }
          for (const file of packed) {
            if (file.endsWith('.node')) {
              throw new Error(`Root package must not include native binary ${file}; binaries belong in platform packages`)
            }
          }
          NODE

          platform_directories=(
            darwin-x64
            darwin-arm64
            win32-x64-msvc
            win32-arm64-msvc
            linux-x64-gnu
            linux-arm64-gnu
            linux-x64-musl
            linux-arm64-musl
          )

          for directory in "${platform_directories[@]}"; do
            package_dir="npm/${directory}"
            if [[ ! -d "$package_dir" ]]; then
              echo "Missing generated platform package directory: $package_dir" >&2
              exit 1
            fi

            (cd "$package_dir" && npm pack --dry-run --json > "${GITHUB_WORKSPACE}/pack-${directory}.json")
          done

          node <<'NODE'
          const { readFileSync } = require('node:fs')

          for (const directory of [
            'darwin-x64',
            'darwin-arm64',
            'win32-x64-msvc',
            'win32-arm64-msvc',
            'linux-x64-gnu',
            'linux-arm64-gnu',
            'linux-x64-musl',
            'linux-arm64-musl',
          ]) {
            const report = JSON.parse(readFileSync(`pack-${directory}.json`, 'utf8'))[0]
            const packed = new Set(report.files.map((file) => file.path))
            for (const required of ['README.md', 'package.json']) {
              if (!packed.has(required)) {
                throw new Error(`${directory} package dry-run is missing ${required}`)
              }
            }
            const nativeFiles = [...packed].filter((file) => file.endsWith('.node'))
            if (nativeFiles.length !== 1) {
              throw new Error(`${directory} package dry-run must contain exactly one native .node file, found ${nativeFiles.length}`)
            }
          }
          NODE

      - name: Pack release tarballs
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist
          npm pack --pack-destination dist --json
          platform_directories=(
            darwin-x64
            darwin-arm64
            win32-x64-msvc
            win32-arm64-msvc
            linux-x64-gnu
            linux-arm64-gnu
            linux-x64-musl
            linux-arm64-musl
          )

          for directory in "${platform_directories[@]}"; do
            package_dir="npm/${directory}"
            if [[ ! -d "$package_dir" ]]; then
              echo "Missing generated platform package directory: $package_dir" >&2
              exit 1
            fi

            (cd "$package_dir" && npm pack --pack-destination "${GITHUB_WORKSPACE}/dist" --json)
          done

          expected_count=9
          actual_count="$(find dist -maxdepth 1 -name '*.tgz' | wc -l | tr -d ' ')"
          if [[ "$actual_count" != "$expected_count" ]]; then
            echo "Expected $expected_count release tarballs, found $actual_count" >&2
            find dist -maxdepth 1 -type f -print >&2
            exit 1
          fi

          node <<'NODE'
          const { readdirSync } = require('node:fs')

          const version = process.env.VERSION
          const packageNames = [
            'captura-darwin-x64',
            'captura-darwin-arm64',
            'captura-win32-x64-msvc',
            'captura-win32-arm64-msvc',
            'captura-linux-x64-gnu',
            'captura-linux-arm64-gnu',
            'captura-linux-x64-musl',
            'captura-linux-arm64-musl',
            'captura',
          ]
          const expected = packageNames.map((packageName) => `${packageName}-${version}.tgz`).sort()
          const actual = readdirSync('dist').filter((file) => file.endsWith('.tgz')).sort()
          const missing = expected.filter((file) => !actual.includes(file))
          const unexpected = actual.filter((file) => !expected.includes(file))

          if (missing.length > 0 || unexpected.length > 0) {
            throw new Error(`Release tarballs do not match expected set. Missing: ${missing.join(', ') || '<none>'}. Unexpected: ${unexpected.join(', ') || '<none>'}.`)
          }
          NODE

      - name: Verify npm publish dry-runs
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          NPM_TAG: ${{ needs.prepare.outputs.npm_tag }}
        run: |
          set -euo pipefail

          packages=(
            captura-darwin-x64
            captura-darwin-arm64
            captura-win32-x64-msvc
            captura-win32-arm64-msvc
            captura-linux-x64-gnu
            captura-linux-arm64-gnu
            captura-linux-x64-musl
            captura-linux-arm64-musl
            captura
          )

          for package_name in "${packages[@]}"; do
            tarball="./dist/${package_name}-${VERSION}.tgz"
            if [[ ! -f "$tarball" ]]; then
              echo "Missing release tarball for publish dry-run: $tarball" >&2
              exit 1
            fi

            npm publish "$tarball" --dry-run --tag "$NPM_TAG" --registry https://registry.npmjs.org
          done

      - uses: actions/upload-artifact@v7
        with:
          name: npm-release-tarballs
          path: dist/*.tgz
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  smoke-native:
    name: Smoke ${{ matrix.label }}
    needs: [prepare, package]
    runs-on: ${{ matrix.host }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: captura-darwin-x64
            label: captura-darwin-x64
            host: macos-15-intel
            timeout: 20
          - package: captura-darwin-arm64
            label: captura-darwin-arm64
            host: macos-15
            timeout: 20
          - package: captura-win32-x64-msvc
            label: captura-win32-x64-msvc
            host: windows-2025-vs2026
            timeout: 20
          - package: captura-win32-arm64-msvc
            label: captura-win32-arm64-msvc
            host: windows-11-arm
            timeout: 30
          - package: captura-linux-x64-gnu
            label: captura-linux-x64-gnu on Ubuntu 24.04
            host: ubuntu-24.04
            timeout: 20
          - package: captura-linux-arm64-gnu
            label: captura-linux-arm64-gnu on Ubuntu 24.04
            host: ubuntu-24.04-arm
            timeout: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - uses: actions/download-artifact@v8
        with:
          name: npm-release-tarballs
          path: dist

      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          . /etc/os-release
          pipewire_runtime=libpipewire-0.3-0
          if [[ "${VERSION_CODENAME:-}" == "noble" || "${VERSION_ID:-}" == "24.04" ]]; then
            pipewire_runtime=libpipewire-0.3-0t64
          fi

          sudo apt-get update
          sudo apt-get install -y libxcb1 libxrandr2 libdbus-1-3 \
            "$pipewire_runtime" libwayland-client0 libwayland-server0 \
            libegl1 libgbm1

      - name: Install package tarballs and smoke-test loader
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          PLATFORM_PACKAGE: ${{ matrix.package }}
        run: |
          set -euo pipefail

          mkdir smoke
          cd smoke
          npm init -y >/dev/null
          npm install --ignore-scripts \
            "../dist/${PLATFORM_PACKAGE}-${VERSION}.tgz" \
            "../dist/captura-${VERSION}.tgz"

          if [[ "${RUNNER_OS:-}" == "Linux" ]]; then
            mapfile -t native_files < <(find node_modules -type f -name '*.node' -print | sort)
            if (( ${#native_files[@]} != 1 )); then
              printf 'Expected exactly one installed Linux .node binding, found %s:\n' "${#native_files[@]}" >&2
              printf '%s\n' "${native_files[@]}" >&2
              exit 1
            fi

            link_report="$(ldd "${native_files[0]}")"
            printf '%s\n' "$link_report"
            if grep -Fq 'not found' <<<"$link_report"; then
              echo "Installed Linux native package has unresolved shared-library dependencies." >&2
              exit 1
            fi
          fi

          node --test "${GITHUB_WORKSPACE}/__tests__/installed-package-smoke.mts"

  smoke-musl:
    name: Smoke ${{ matrix.package }}
    needs: [prepare, package]
    runs-on: ${{ matrix.host }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: captura-linux-x64-musl
            host: ubuntu-24.04
            docker_platform: linux/amd64
            timeout: 30
          - package: captura-linux-arm64-musl
            host: ubuntu-24.04-arm
            docker_platform: linux/arm64
            timeout: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: npm-release-tarballs
          path: dist

      - name: Install package tarballs and smoke-test loader in Alpine
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          PLATFORM_PACKAGE: ${{ matrix.package }}
        run: |
          set -euo pipefail

          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "${{ github.workspace }}/dist:/dist:ro" \
            -v "${{ github.workspace }}/__tests__:/tests:ro" \
            -e VERSION="$VERSION" \
            -e PLATFORM_PACKAGE="$PLATFORM_PACKAGE" \
            node:${{ env.NODE_VERSION }}-alpine sh -s <<'ALPINE'
          set -e

          apk add --no-cache \
            libxcb-dev libxrandr-dev dbus-dev \
            pipewire-dev wayland-dev mesa-dev

          mkdir /tmp/captura-smoke
          cd /tmp/captura-smoke
          npm init -y >/dev/null
          npm install --ignore-scripts \
            "/dist/${PLATFORM_PACKAGE}-${VERSION}.tgz" \
            "/dist/captura-${VERSION}.tgz"

          node --test /tests/installed-package-smoke.mts
          ALPINE

  publish_trusted:
    name: Publish npm packages (Trusted Publishing)
    needs: [prepare, package, smoke-native, smoke-musl]
    if: ${{ needs.prepare.outputs.publish == 'true' && needs.prepare.outputs.publish_auth == 'trusted-publishing' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: ${{ format('npm-{0}', 'production') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: actions/download-artifact@v8
        with:
          name: npm-release-tarballs
          path: dist

      - name: Verify Trusted Publishing runtime
        shell: bash
        run: |
          set -euo pipefail

          npm_version="$(npm --version)"
          node_version="$(node -p 'process.versions.node')"

          NPM_VERSION="$npm_version" NODE_VERSION_ACTUAL="$node_version" node <<'NODE'
          function parseVersion(value) {
            return value.split('.').map((part) => Number.parseInt(part, 10))
          }

          function assertAtLeast(actual, required, label) {
            const actualParts = parseVersion(actual)
            const requiredParts = parseVersion(required)
            for (let index = 0; index < requiredParts.length; index += 1) {
              const actualPart = actualParts[index] ?? 0
              const requiredPart = requiredParts[index] ?? 0
              if (actualPart > requiredPart) return
              if (actualPart < requiredPart) {
                throw new Error(`${label} ${actual} is too old for npm Trusted Publishing; require >= ${required}`)
              }
            }
          }

          assertAtLeast(process.env.NODE_VERSION_ACTUAL, '22.14.0', 'Node.js')
          assertAtLeast(process.env.NPM_VERSION, '11.5.1', 'npm')
          NODE

          echo "Using npm ${npm_version} and Node.js ${node_version} for npm Trusted Publishing."

      - name: Publish platform packages first, root package last
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          NPM_TAG: ${{ needs.prepare.outputs.npm_tag }}
        run: bash .github/scripts/publish-npm-tarballs.sh

  publish_token_bootstrap:
    name: Publish npm packages (token bootstrap)
    needs: [prepare, package, smoke-native, smoke-musl]
    if: ${{ needs.prepare.outputs.publish == 'true' && needs.prepare.outputs.publish_auth == 'token-bootstrap' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: ${{ format('npm-{0}', 'bootstrap') }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: actions/download-artifact@v8
        with:
          name: npm-release-tarballs
          path: dist

      - name: Publish with one-time npm token
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          NPM_TAG: ${{ needs.prepare.outputs.npm_tag }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "Missing NPM_TOKEN environment secret in the npm-bootstrap environment." >&2
            exit 1
          fi

          userconfig="${RUNNER_TEMP}/npm-token-bootstrap.npmrc"
          cleanup() {
            rm -f "$userconfig"
          }
          trap cleanup EXIT

          umask 077
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$userconfig"
          unset NPM_TOKEN
          export NPM_CONFIG_USERCONFIG="$userconfig"

          echo "Using one-time npm token bootstrap. Delete this secret and switch to Trusted Publishing after the first publish."
          bash .github/scripts/publish-npm-tarballs.sh

  publish_complete:
    name: Confirm npm publish completed
    needs: [prepare, publish_trusted, publish_token_bootstrap]
    if: ${{ always() && needs.prepare.outputs.publish == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check selected publish job
        shell: bash
        env:
          PUBLISH_AUTH: ${{ needs.prepare.outputs.publish_auth }}
          TRUSTED_RESULT: ${{ needs.publish_trusted.result }}
          TOKEN_BOOTSTRAP_RESULT: ${{ needs.publish_token_bootstrap.result }}
        run: |
          set -euo pipefail

          case "$PUBLISH_AUTH" in
            trusted-publishing)
              selected_result="$TRUSTED_RESULT"
              ;;
            token-bootstrap)
              selected_result="$TOKEN_BOOTSTRAP_RESULT"
              ;;
            *)
              echo "Unexpected publish authentication mode: $PUBLISH_AUTH" >&2
              exit 1
              ;;
          esac

          if [[ "$selected_result" != "success" ]]; then
            echo "Selected publish job ($PUBLISH_AUTH) finished with result: $selected_result" >&2
            exit 1
          fi

          echo "Selected publish job completed successfully: $PUBLISH_AUTH"

  github-release:
    name: Create GitHub release
    needs: [prepare, publish_complete]
    if: ${{ needs.prepare.outputs.publish == 'true' && needs.publish_complete.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: npm-release-tarballs
          path: dist

      - name: Verify GitHub release tarballs
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          expected=(
            captura-darwin-x64
            captura-darwin-arm64
            captura-win32-x64-msvc
            captura-win32-arm64-msvc
            captura-linux-x64-gnu
            captura-linux-arm64-gnu
            captura-linux-x64-musl
            captura-linux-arm64-musl
            captura
          )

          mapfile -t actual < <(find dist -maxdepth 1 -type f -name '*.tgz' -printf '%f\n' | sort)
          mapfile -t wanted < <(printf '%s\n' "${expected[@]}" | sed "s/$/-${VERSION}.tgz/" | sort)

          if [[ "${actual[*]}" != "${wanted[*]}" ]]; then
            echo "GitHub release tarballs do not match expected set." >&2
            echo "Expected:" >&2
            printf '  %s\n' "${wanted[@]}" >&2
            echo "Actual:" >&2
            printf '  %s\n' "${actual[@]}" >&2
            exit 1
          fi

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tgz --clobber
          else
            gh release create "$tag" dist/*.tgz \
              --verify-tag \
              --title "captura ${tag}" \
              --generate-notes
          fi
