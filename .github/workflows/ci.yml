name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1
  NODE_VERSION: 24

# ---------------------------------------------------------------------------
# Linux system packages required by xcap
# ---------------------------------------------------------------------------
# xcap depends on X11/Wayland/PipeWire/EGL system libraries.
# GNU targets install them via apt; musl targets via Alpine apk inside Docker.
#
# apt (Debian/Ubuntu):
#   pkg-config libclang-dev libxcb1-dev libxrandr-dev libdbus-1-dev
#   libpipewire-0.3-dev libwayland-dev libegl-dev libgbm-dev
#
# apk (Alpine):
#   clang-dev pkgconf libxcb-dev libxrandr-dev dbus-dev
#   pipewire-dev wayland-dev mesa-dev (mesa-dev provides gbm)
# ---------------------------------------------------------------------------

jobs:
  # ── Rust quality checks ──────────────────────────────────────────────────
  check:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libclang-dev \
            libxcb1-dev libxrandr-dev libdbus-1-dev \
            libpipewire-0.3-dev libwayland-dev libegl-dev libgbm-dev

      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: cargo doc --workspace --no-deps --locked

  # ── Build native module ──────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: ${{ matrix.settings.timeout || 120 }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # ── macOS ────────────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            host: macos-14
          - target: aarch64-apple-darwin
            host: macos-latest

          # ── Windows ─────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            host: windows-latest
          - target: aarch64-pc-windows-msvc
            host: windows-latest

          # ── Linux GNU ───────────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-24.04

          # ── Linux musl (built inside Alpine Docker containers) ──────────
          - target: x86_64-unknown-linux-musl
            host: ubuntu-24.04
            docker: true
          - target: aarch64-unknown-linux-musl
            host: ubuntu-24.04
            docker: true
            timeout: 200

    steps:
      - uses: actions/checkout@v6

      # ── Toolchain (non-Docker builds) ───────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.settings.docker }}

      - uses: actions/setup-node@v6
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        if: ${{ !matrix.settings.docker }}
        run: npm ci

      # ── x86_64-linux-gnu: native build with system deps ────────────────
      - name: Install system dependencies (x86_64-linux-gnu)
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libclang-dev \
            libxcb1-dev libxrandr-dev libdbus-1-dev \
            libpipewire-0.3-dev libwayland-dev libegl-dev libgbm-dev

      # ── aarch64-linux-gnu: multiarch cross-compilation ─────────────────
      - name: Setup cross-compilation (aarch64-linux-gnu)
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64

          # Ubuntu 24.04 uses DEB822 format (.sources files). Restrict
          # every existing source stanza to amd64 so that apt does not
          # try to fetch arm64 indices from mirrors that don't carry them.
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && sudo sed -i '/^Types: /a Architectures: amd64' "$f"
          done

          # Also handle any traditional .list files that may still exist.
          # The runner image pre-installs Docker, Microsoft Edge, GitHub CLI,
          # etc., which add .list files with https:// URIs and [signed-by=...]
          # option blocks. A naive sed on "deb http" misses all of those.
          for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo perl -0pi -e '
              s{^deb(\s+)\[([^\]]*)\](\s+https?://)}{
                my ($ws, $opts, $uri_ws) = ($1, $2, $3);
                $opts =~ /\barch=amd64\b/
                  ? "deb${ws}[${opts}]${uri_ws}"
                  : "deb${ws}[${opts} arch=amd64]${uri_ws}";
              }gme;
              s{^deb(\s+)(https?://)}{"deb${1}[arch=amd64] ${2}"}gme;
            ' "$f" 2>/dev/null || true
          done

          # arm64 packages live on ports.ubuntu.com
          sudo tee /etc/apt/sources.list.d/arm64-ports.sources > /dev/null <<'SOURCES'
          Types: deb
          URIs: https://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates
          Components: main restricted universe multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          SOURCES

          sudo apt-get update

          # Cross-compiler + host libclang (needed by bindgen)
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            libclang-dev

          # Target-architecture xcap development libraries
          sudo apt-get install -y \
            libxcb1-dev:arm64 \
            libxrandr-dev:arm64 \
            libdbus-1-dev:arm64 \
            libpipewire-0.3-dev:arm64 \
            libwayland-dev:arm64 \
            libegl-dev:arm64 \
            libgbm-dev:arm64

      # ── QEMU setup for arm64 musl Docker build ────────────────────────
      - name: Setup QEMU
        if: matrix.settings.target == 'aarch64-unknown-linux-musl'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      # ── musl: build inside Alpine Docker container ─────────────────────
      # Docker provides a native musl environment with the correct system
      # libraries. Rust is installed via rustup inside the container.
      - name: Build (musl via Alpine Docker)
        if: ${{ matrix.settings.docker }}
        run: |
          DOCKER_PLATFORM=""
          if [ "${{ matrix.settings.target }}" = "aarch64-unknown-linux-musl" ]; then
            DOCKER_PLATFORM="--platform linux/arm64"
          fi

          docker run --rm $DOCKER_PLATFORM \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            node:${{ env.NODE_VERSION }}-alpine sh -c '
              set -eu

              # System dependencies for xcap
              apk add --no-cache \
                curl build-base clang-dev pkgconf \
                libxcb-dev libxrandr-dev dbus-dev \
                pipewire-dev wayland-dev mesa-dev

              # Rust toolchain
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | \
                sh -s -- -y --default-toolchain stable
              source "$HOME/.cargo/env"

              # On musl, Rust statically links the CRT by default
              # (+crt-static), which stubs dlopen(). bindgen (used by
              # libspa-sys) needs dlopen() at build time to load
              # libclang. Disabling crt-static produces dynamically-
              # linked binaries where dlopen() works.
              #
              # PROBLEM: napi-rs CLI always passes --target to cargo
              # internally (even when omitted from the CLI). When
              # --target is set, RUSTFLAGS only applies to target
              # code — not to build scripts or proc macros. Build
              # scripts are still compiled with +crt-static and
              # cannot dlopen() libclang.
              # (Ref: https://doc.rust-lang.org/cargo/reference/config.html#buildrustflags)
              #
              # FIX: RUSTC_WRAPPER injects the flag into every rustc
              # invocation, including build scripts and proc macros.
              # The [host] Cargo config would be cleaner, but it is
              # still an unstable feature requiring nightly.
              # (Ref: https://github.com/rust-lang/cargo/issues/9452)
              printf "#!/bin/sh\nexec \"\$@\" -C target-feature=-crt-static\n" \
                > /usr/local/bin/rustc-crt-dynamic
              chmod +x /usr/local/bin/rustc-crt-dynamic
              export RUSTC_WRAPPER=/usr/local/bin/rustc-crt-dynamic

              # Cargo uses target-specific default linker names (e.g.
              # aarch64-linux-musl-gcc for aarch64-unknown-linux-musl).
              # On Alpine the native GCC is simply "gcc".
              export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=gcc
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=gcc

              npm ci
              npx napi build --platform --release -p xshot -o .
            '

          # Fix file ownership after Docker (container runs as root)
          sudo chown -R "$(id -u):$(id -g)" .

      # ── Non-Docker build ───────────────────────────────────────────────
      - name: Build
        if: ${{ !matrix.settings.docker }}
        env:
          # aarch64-linux-gnu cross-compilation (ignored by other targets)
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: '1'
          PKG_CONFIG_LIBDIR_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: npx napi build --platform --release -p xshot -o . --target ${{ matrix.settings.target }}

      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            index.js
            index.d.ts
          if-no-files-found: error
          retention-days: 1

  # ── JS integration tests ─────────────────────────────────────────────────
  # Run on every platform with a native runner. Display-dependent tests are
  # automatically skipped in headless environments (Linux CI).
  test-js:
    name: Test JS (${{ matrix.settings.target }})
    needs: build
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: aarch64-apple-darwin
            host: macos-latest
          - target: x86_64-pc-windows-msvc
            host: windows-latest
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.settings.target }}

      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1 libxrandr2 libdbus-1-3 \
            libpipewire-0.3-0 libwayland-client0 libegl1 libgbm1

      - run: npm run typecheck
      - run: npm test

  # ── CI gate ──────────────────────────────────────────────────────────────
  # Single required check for branch protection. With matrix strategies, job
  # names are dynamic (e.g. "Build x86_64-apple-darwin"). This job provides
  # one stable name — "CI" — to configure as a required status check.
  ci:
    name: CI
    if: always()
    needs: [check, build, test-js]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        if: >-
          needs.check.result != 'success' ||
          needs.build.result != 'success' ||
          needs.test-js.result != 'success'
        run: exit 1
