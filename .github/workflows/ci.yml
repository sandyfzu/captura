name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1
  NODE_VERSION: 24

# ---------------------------------------------------------------------------
# Linux system packages required by xcap
# ---------------------------------------------------------------------------
# xcap depends on X11/Wayland/PipeWire/EGL system libraries.
# GNU targets install them via apt on native Ubuntu runners; GNU binaries are
# built on Ubuntu 24.04 because the current pipewire-rs/libspa bindings require
# PipeWire headers newer than Ubuntu 22.04's package set.
# Musl targets use Alpine apk inside Docker on a matching native host.
#
# apt (Debian/Ubuntu):
#   pkg-config libclang-dev libxcb1-dev libxrandr-dev libdbus-1-dev
#   libpipewire-0.3-dev libwayland-dev libegl-dev libgbm-dev
#
# apk (Alpine):
#   clang-dev pkgconf libxcb-dev libxrandr-dev dbus-dev
#   pipewire-dev wayland-dev mesa-dev (mesa-dev provides gbm)
# ---------------------------------------------------------------------------

jobs:
  # ── Rust quality checks ──────────────────────────────────────────────────
  check:
    name: Rust (${{ matrix.settings.label }})
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        settings:
          - label: Linux x64 GNU
            host: ubuntu-24.04
            node_arch: x64
          - label: Linux ARM64 GNU
            host: ubuntu-24.04-arm
            node_arch: arm64
          - label: macOS Intel
            host: macos-15-intel
            node_arch: x64
          - label: macOS ARM64
            host: macos-15
            node_arch: arm64
          - label: Windows x64
            host: windows-2025
            node_arch: x64
          - label: Windows ARM64
            host: windows-11-arm
            node_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.host }}-${{ matrix.settings.node_arch }}-check

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify native Node.js architecture
        env:
          EXPECTED_NODE_ARCH: ${{ matrix.settings.node_arch }}
        run: |
          node -e 'const actual = process.arch; const expected = process.env.EXPECTED_NODE_ARCH; if (actual !== expected) { throw new Error("Expected native Node.js " + expected + ", got " + actual); }'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libclang-dev \
            libxcb1-dev libxrandr-dev libdbus-1-dev \
            libpipewire-0.3-dev libwayland-dev libegl-dev libgbm-dev

      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: cargo doc --workspace --no-deps --locked

  # ── Dependency audit (licenses, advisories, bans, sources) ───────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ── Build native module ──────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.settings.label }}
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: ${{ matrix.settings.timeout }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # ── macOS ────────────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            label: x86_64-apple-darwin
            host: macos-15-intel
            timeout: 120
            docker: false
            node_arch: x64
          - target: aarch64-apple-darwin
            label: aarch64-apple-darwin
            host: macos-15
            timeout: 120
            docker: false
            node_arch: arm64

          # ── Windows ─────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            label: x86_64-pc-windows-msvc
            host: windows-2025
            timeout: 120
            docker: false
            node_arch: x64
          - target: aarch64-pc-windows-msvc
            label: aarch64-pc-windows-msvc
            host: windows-11-arm
            timeout: 120
            docker: false
            node_arch: arm64

          # ── Linux GNU ───────────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            label: x86_64-unknown-linux-gnu on Ubuntu 24.04
            host: ubuntu-24.04
            timeout: 120
            docker: false
            node_arch: x64
          - target: aarch64-unknown-linux-gnu
            label: aarch64-unknown-linux-gnu on Ubuntu 24.04 ARM64
            host: ubuntu-24.04-arm
            timeout: 120
            docker: false
            node_arch: arm64

          # ── Linux musl (built inside Alpine Docker container) ───────────
          - target: x86_64-unknown-linux-musl
            label: x86_64-unknown-linux-musl
            host: ubuntu-24.04
            timeout: 120
            docker: true
            node_arch: x64
          - target: aarch64-unknown-linux-musl
            label: aarch64-unknown-linux-musl on Ubuntu ARM64
            host: ubuntu-24.04-arm
            timeout: 120
            docker: true
            node_arch: arm64

    steps:
      - uses: actions/checkout@v6

      # ── Toolchain (non-Docker builds) ───────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.settings.docker }}
        with:
          key: ${{ matrix.settings.host }}-${{ matrix.settings.target }}-build

      - uses: actions/setup-node@v6
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        if: ${{ !matrix.settings.docker }}
        run: npm ci

      - name: Verify native Node.js architecture
        if: ${{ !matrix.settings.docker }}
        env:
          EXPECTED_NODE_ARCH: ${{ matrix.settings.node_arch }}
        run: |
          node -e 'const actual = process.arch; const expected = process.env.EXPECTED_NODE_ARCH; if (actual !== expected) { throw new Error("Expected native Node.js " + expected + ", got " + actual); }'

      # ── Linux GNU: native build with system deps ───────────────────────
      - name: Install system dependencies (linux-gnu)
        if: runner.os == 'Linux' && !matrix.settings.docker
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libclang-dev \
            libxcb1-dev libxrandr-dev libdbus-1-dev \
            libpipewire-0.3-dev libwayland-dev libegl-dev libgbm-dev

      # ── musl: build inside Alpine Docker container ─────────────────────
      # Docker provides a native musl environment with the correct system
      # libraries. Rust is installed via rustup inside the container.
      - name: Build (musl via Alpine Docker)
        if: ${{ matrix.settings.docker }}
        shell: bash
        env:
          EXPECTED_NODE_ARCH: ${{ matrix.settings.node_arch }}
          NAPI_TARGET: ${{ matrix.settings.target }}
        run: |
          docker run --rm \
            -e EXPECTED_NODE_ARCH \
            -e NAPI_TARGET \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            node:${{ env.NODE_VERSION }}-alpine sh -c '
              set -eu

              actual_arch="$(node -p "process.arch")"
              if [ "$actual_arch" != "$EXPECTED_NODE_ARCH" ]; then
                echo "Expected native Node.js $EXPECTED_NODE_ARCH, got $actual_arch" >&2
                exit 1
              fi

              # System dependencies for xcap
              apk add --no-cache \
                curl build-base clang-dev pkgconf \
                libxcb-dev libxrandr-dev dbus-dev \
                pipewire-dev wayland-dev mesa-dev

              # Rust toolchain
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | \
                sh -s -- -y --default-toolchain stable
              . "$HOME/.cargo/env"

              # On musl, Rust statically links the CRT by default
              # (+crt-static), which stubs dlopen(). bindgen (used by
              # libspa-sys) needs dlopen() at build time to load
              # libclang. Disabling crt-static produces dynamically-
              # linked binaries where dlopen() works.
              #
              # PROBLEM: napi-rs CLI always passes --target to cargo
              # internally (even when omitted from the CLI). When
              # --target is set, RUSTFLAGS only applies to target
              # code — not to build scripts or proc macros. Build
              # scripts are still compiled with +crt-static and
              # cannot dlopen() libclang.
              # (Ref: https://doc.rust-lang.org/cargo/reference/config.html#buildrustflags)
              #
              # FIX: RUSTC_WRAPPER injects the flag into every rustc
              # invocation, including build scripts and proc macros.
              # The [host] Cargo config would be cleaner, but it is
              # still an unstable feature requiring nightly.
              # (Ref: https://github.com/rust-lang/cargo/issues/9452)
              printf "#!/bin/sh\nrustc=\"\$1\"\nshift\nexec \"\$rustc\" -C target-feature=-crt-static \"\$@\"\n" \
                > /usr/local/bin/rustc-crt-dynamic
              chmod +x /usr/local/bin/rustc-crt-dynamic
              export RUSTC_WRAPPER=/usr/local/bin/rustc-crt-dynamic

              # Cargo uses target-specific default linker names (e.g.
              # aarch64-linux-musl-gcc for aarch64-unknown-linux-musl).
              # On Alpine the native GCC is simply "gcc".
              export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=gcc
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=gcc

              npm ci
              npx napi build --platform --release -p xshot -o . --target "$NAPI_TARGET" -- --locked
            '

          # Fix file ownership after Docker (container runs as root)
          sudo chown -R "$(id -u):$(id -g)" .

      # ── Non-Docker build ───────────────────────────────────────────────
      - name: Build
        if: ${{ !matrix.settings.docker }}
        run: npx napi build --platform --release -p xshot -o . --target ${{ matrix.settings.target }} -- --locked

      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            index.js
            index.d.ts
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  # ── JS integration tests ─────────────────────────────────────────────────
  # Run on every GNU/macOS/Windows platform with a native runner. Linux GNU is
  # tested on the Ubuntu 24.04 build and runtime baseline.
  # Display-dependent tests are automatically skipped in headless environments.
  test-js:
    name: Test JS (${{ matrix.settings.label }})
    needs: build
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: aarch64-apple-darwin
            label: aarch64-apple-darwin
            host: macos-15
            node_arch: arm64
          - target: x86_64-apple-darwin
            label: x86_64-apple-darwin
            host: macos-15-intel
            node_arch: x64
          - target: x86_64-pc-windows-msvc
            label: x86_64-pc-windows-msvc
            host: windows-2025
            node_arch: x64
          - target: aarch64-pc-windows-msvc
            label: aarch64-pc-windows-msvc
            host: windows-11-arm
            node_arch: arm64
          - target: x86_64-unknown-linux-gnu
            label: x86_64-unknown-linux-gnu on Ubuntu 24.04
            host: ubuntu-24.04
            node_arch: x64
          - target: aarch64-unknown-linux-gnu
            label: aarch64-unknown-linux-gnu on Ubuntu 24.04 ARM64
            host: ubuntu-24.04-arm
            node_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify native Node.js architecture
        env:
          EXPECTED_NODE_ARCH: ${{ matrix.settings.node_arch }}
        run: |
          node -e 'const actual = process.arch; const expected = process.env.EXPECTED_NODE_ARCH; if (actual !== expected) { throw new Error("Expected native Node.js " + expected + ", got " + actual); }'

      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.settings.target }}
          digest-mismatch: error

      - name: Verify downloaded artifact files
        env:
          NAPI_TARGET: ${{ matrix.settings.target }}
        run: |
          node -e 'const fs = require("fs"); const target = process.env.NAPI_TARGET; const bindings = fs.readdirSync(".").filter((name) => name.endsWith(".node")); for (const file of ["index.js", "index.d.ts"]) { if (!fs.existsSync(file)) { throw new Error("Missing " + file + " in artifact for " + target); } } if (bindings.length !== 1) { throw new Error("Expected exactly one .node binding for " + target + ", found " + bindings.length + ": " + bindings.join(", ")); }'

      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          . /etc/os-release
          pipewire_runtime=libpipewire-0.3-0
          if [[ "${VERSION_CODENAME:-}" == "noble" || "${VERSION_ID:-}" == "24.04" ]]; then
            pipewire_runtime=libpipewire-0.3-0t64
          fi

          sudo apt-get update
          sudo apt-get install -y libxcb1 libxrandr2 libdbus-1-3 \
            "$pipewire_runtime" libwayland-client0 libwayland-server0 \
            libegl1 libgbm1

      - name: Verify Linux native runtime links
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          bindings=(*.node)
          if (( ${#bindings[@]} != 1 )); then
            printf 'Expected exactly one Linux .node binding, found %s: %s\n' "${#bindings[@]}" "${bindings[*]}" >&2
            exit 1
          fi

          link_report="$(ldd "${bindings[0]}")"
          printf '%s\n' "$link_report"
          if grep -Fq 'not found' <<<"$link_report"; then
            echo "Linux native binding has unresolved shared-library dependencies." >&2
            exit 1
          fi

      - run: npm run typecheck
      - run: npm test

  # ── JS integration tests: Linux musl ─────────────────────────────────────
  # Musl artifacts must be tested inside Alpine. Docker runs on a matching
  # native Ubuntu host architecture, so no QEMU or emulation is involved.
  test-musl:
    name: Test JS (${{ matrix.settings.label }})
    needs: build
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-unknown-linux-musl
            label: x86_64-unknown-linux-musl on Alpine x64
            host: ubuntu-24.04
            node_arch: x64
          - target: aarch64-unknown-linux-musl
            label: aarch64-unknown-linux-musl on Alpine ARM64
            host: ubuntu-24.04-arm
            node_arch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.settings.target }}
          digest-mismatch: error

      - name: Verify downloaded artifact files
        shell: bash
        run: |
          shopt -s nullglob
          bindings=(*.node)
          if (( ${#bindings[@]} != 1 )); then
            printf 'Expected exactly one .node binding, found %s: %s\n' "${#bindings[@]}" "${bindings[*]}" >&2
            exit 1
          fi
          test -f index.js
          test -f index.d.ts

      - name: Test in native Alpine Docker
        shell: bash
        env:
          EXPECTED_NODE_ARCH: ${{ matrix.settings.node_arch }}
        run: |
          docker run --rm \
            -e EXPECTED_NODE_ARCH \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            node:${{ env.NODE_VERSION }}-alpine sh -c '
              set -eu

              actual_arch="$(node -p "process.arch")"
              if [ "$actual_arch" != "$EXPECTED_NODE_ARCH" ]; then
                echo "Expected native Node.js $EXPECTED_NODE_ARCH, got $actual_arch" >&2
                exit 1
              fi

              apk add --no-cache \
                libxcb-dev libxrandr-dev dbus-dev \
                pipewire-dev wayland-dev mesa-dev

              npm ci
              npm run typecheck
              npm test
            '

  # ── CI gate ──────────────────────────────────────────────────────────────
  # Single required check for branch protection. With matrix strategies, job
  # names are dynamic (e.g. "Build x86_64-apple-darwin"). This job provides
  # one stable name — "CI" — to configure as a required status check.
  ci:
    name: CI
    if: always()
    needs: [check, deny, build, test-js, test-musl]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        if: >-
          needs.check.result != 'success' ||
          needs.deny.result != 'success' ||
          needs.build.result != 'success' ||
          needs.test-js.result != 'success' ||
           needs.test-musl.result != 'success'
        run: exit 1
