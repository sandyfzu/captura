# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "aarch64-pc-windows-msvc",
    "x86_64-pc-windows-msvc",
]

# -- Advisories (CVE / RUSTSEC vulnerability database) ---------------------
[advisories]
# vulnerability, unsound, and notice fields are removed in cargo-deny >= 0.15;
# all advisories are errors by default except those explicitly ignored.
unmaintained = "workspace"
yanked = "warn"

# -- Licenses -------------------------------------------------------------
[licenses]
# All licenses are denied unless explicitly listed in `allow`.
# The `unlicensed` field was removed in cargo-deny >= 0.15.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
# Note: r-efi (a UEFI specification constants crate) appears in Cargo.lock
# via getrandom but only resolves for UEFI targets — none of our supported
# platforms (macOS, Linux, Windows). Its license is triple-disjunctive
# (MIT OR Apache-2.0 OR LGPL-2.1-or-later), so the MIT term in `allow`
# satisfies it without an explicit exception.

# -- Bans (duplicate / denied crates) -------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "allow"

# -- Sources (registry allowlist) ------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
